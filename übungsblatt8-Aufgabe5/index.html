<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triangle ABC – Vectors, Medians, Heights</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }
    h1, h2 {
      margin-bottom: 8px;
    }
    .section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .plot {
      width: 100%;
      height: 600px;
    }
    code {
      background: #eee;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Triangle ABC in 3D</h1>
  <p>
    Points: <code>A(1,1,1)</code>, <code>B(-3,0,2)</code>, <code>C(4,1,0)</code>.
    You can rotate, zoom, and inspect the diagrams.
  </p>

  <div class="section">
    <h2>1. Triangle and Side Vectors / Seitenvektoren</h2>
    <div id="plotSides" class="plot"></div>
  </div>

  <div class="section">
    <h2>2. Medians / Seitenhalbierende</h2>
    <div id="plotMedians" class="plot"></div>
  </div>

  <div class="section">
    <h2>3. Heights / Höhenvektoren</h2>
    <div id="plotHeights" class="plot"></div>
  </div>

  <script>
    const A = [1, 1, 1];
    const B = [-3, 0, 2];
    const C = [4, 1, 0];

    function mid(P, Q) {
      return [(P[0] + Q[0]) / 2, (P[1] + Q[1]) / 2, (P[2] + Q[2]) / 2];
    }

    function sub(P, Q) {
      return [P[0] - Q[0], P[1] - Q[1], P[2] - Q[2]];
    }

    function add(P, Q) {
      return [P[0] + Q[0], P[1] + Q[1], P[2] + Q[2]];
    }

    function mul(s, P) {
      return [s * P[0], s * P[1], s * P[2]];
    }

    function dot(P, Q) {
      return P[0]*Q[0] + P[1]*Q[1] + P[2]*Q[2];
    }

    function footPoint(P, Q, R) {
      // Foot from P onto line QR
      const QR = sub(R, Q);
      const QP = sub(P, Q);
      const t = dot(QP, QR) / dot(QR, QR);
      return add(Q, mul(t, QR));
    }

    const M_BC = mid(B, C);
    const M_CA = mid(C, A);
    const M_AB = mid(A, B);

    const F_A = footPoint(A, B, C);
    const F_B = footPoint(B, C, A);
    const F_C = footPoint(C, A, B);

    function pointTrace(points, labels) {
      return {
        type: 'scatter3d',
        mode: 'markers+text',
        x: points.map(p => p[0]),
        y: points.map(p => p[1]),
        z: points.map(p => p[2]),
        text: labels,
        textposition: 'top center',
        marker: { size: 6 },
        name: 'Points'
      };
    }

    function lineTrace(P, Q, name) {
      return {
        type: 'scatter3d',
        mode: 'lines+text',
        x: [P[0], Q[0]],
        y: [P[1], Q[1]],
        z: [P[2], Q[2]],
        text: ['', name],
        textposition: 'middle right',
        line: { width: 6 },
        name
      };
    }

    function triangleMesh() {
      return {
        type: 'mesh3d',
        x: [A[0], B[0], C[0]],
        y: [A[1], B[1], C[1]],
        z: [A[2], B[2], C[2]],
        i: [0],
        j: [1],
        k: [2],
        opacity: 0.25,
        name: 'Triangle ABC'
      };
    }

    const layout = {
      margin: { l: 0, r: 0, b: 0, t: 0 },
      scene: {
        xaxis: { title: 'x' },
        yaxis: { title: 'y' },
        zaxis: { title: 'z' },
        aspectmode: 'data'
      },
      legend: { orientation: 'h' }
    };

    Plotly.newPlot('plotSides', [
      triangleMesh(),
      pointTrace([A, B, C], ['A', 'B', 'C']),
      lineTrace(A, B, 'AB = (-4,-1,1)'),
      lineTrace(B, C, 'BC = (7,1,-2)'),
      lineTrace(C, A, 'CA = (-3,0,1)')
    ], layout);

    Plotly.newPlot('plotMedians', [
      triangleMesh(),
      pointTrace([A, B, C, M_BC, M_CA, M_AB], ['A', 'B', 'C', 'M_BC', 'M_CA', 'M_AB']),
      lineTrace(A, M_BC, 'Median from A'),
      lineTrace(B, M_CA, 'Median from B'),
      lineTrace(C, M_AB, 'Median from C')
    ], layout);

    Plotly.newPlot('plotHeights', [
      triangleMesh(),
      pointTrace([A, B, C, F_A, F_B, F_C], ['A', 'B', 'C', 'F_A', 'F_B', 'F_C']),
      lineTrace(A, F_A, 'Height from A'),
      lineTrace(B, F_B, 'Height from B'),
      lineTrace(C, F_C, 'Height from C'),
      lineTrace(B, C, 'Opposite side BC'),
      lineTrace(C, A, 'Opposite side CA'),
      lineTrace(A, B, 'Opposite side AB')
    ], layout);
  </script>
</body>
</html>
